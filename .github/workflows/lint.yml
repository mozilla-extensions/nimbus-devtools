name: lint
on:
  push:
    branches:
  pull_request:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install latest npm
        run: npm install -g npm

      - name: npm version
        run: npm --version

      - name: Install dependencies
        run: npm clean-install

      - name: lint
        run: npm run lint
